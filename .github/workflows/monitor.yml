name: ARMS Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test environment variables
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ARMS_USERID: ${{ secrets.ARMS_USERID }}
          ARMS_PASSWORD: ${{ secrets.ARMS_PASSWORD }}
        run: python test_env.py

      - name: Test credentials
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ARMS_USERID: ${{ secrets.ARMS_USERID }}
          ARMS_PASSWORD: ${{ secrets.ARMS_PASSWORD }}
        run: python test_login.py

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ARMS_USERID: ${{ secrets.ARMS_USERID }}
          ARMS_PASSWORD: ${{ secrets.ARMS_PASSWORD }}
        run: |
          echo "Starting ARMS Monitor..."
          python monitor_selenium.py
          echo "Monitor finished with exit code: $?"

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs
          path: monitor.log

      - name: Save database to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git fetch origin main
          git reset --hard origin/main
          git add results.db
          if git diff --staged --quiet; then
            echo "No database changes to commit"
          else
            git commit -m "Update results.db"
            git push origin main
          fi